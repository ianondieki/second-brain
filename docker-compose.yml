# ==============================================================================
#  AGENTIC SECOND BRAIN — Hybrid Local/Cloud Stack
#  Target host: Windows 10/11 + Docker Desktop (WSL2 backend), 8 GB physical RAM
#  Hard ceiling for this stack: < 1.25 GB combined (see mem_limit per service)
#
#  Memory budget (mem_limit ceilings; real resident set is far lower):
#    n8n          450m   (SQLite backend — no Postgres dependency for n8n)
#    evolution    400m   (Baileys WhatsApp engine)
#    postgres     256m   (Evolution metadata only, tuned tiny)
#    redis         96m   (Evolution cache, hard maxmemory 64mb)
#    -------------------
#    CEILING     1202m   (~1.18 GB worst case; idle ~0.5-0.7 GB)
#
#  IMPORTANT — run with `docker compose up -d` (Compose v2 on Docker Desktop).
#  The legacy `mem_limit` short syntax is honoured there. Do NOT deploy this via
#  `docker stack deploy` (Swarm), which ignores mem_limit.
#
#  IMAGE PINNING: tags below are intentionally explicit for reproducibility.
#  Before any long-lived deploy, confirm the latest patch tags:
#    n8n        -> https://hub.docker.com/r/n8nio/n8n/tags
#    evolution  -> https://github.com/EvolutionAPI/evolution-api/releases
#  and bump them deliberately rather than tracking a floating tag.
# ==============================================================================

services:

  # ---------------------------------------------------------------------------
  # 1) n8n — Orchestrator. Reads local Markdown, calls cloud LLM, posts to WA.
  #    SQLite backend keeps the footprint tiny (no second DB process).
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest   # PIN to a tested version, e.g. :1.71.3
    container_name: sb-n8n
    restart: unless-stopped
    ports:
      # Bound to loopback only — never exposed on the LAN.
      - "127.0.0.1:5678:5678"
    environment:
      # --- Core ---
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_EDITOR_BASE_URL=http://localhost:5678/
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=${TZ:-Africa/Lagos}
      - TZ=${TZ:-Africa/Lagos}
      # --- Auth: modern n8n has no basic-auth env. You create an OWNER account
      #     on first visit to http://localhost:5678 (see docs/01). Over plain
      #     http on localhost the secure cookie must be relaxed or login fails. ---
      - N8N_SECURE_COOKIE=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # --- Persistence: SQLite ---
      - DB_TYPE=sqlite
      - N8N_USER_FOLDER=/home/node/.n8n
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # --- Task runners spawn a SECOND Node process. On a 450m cap that extra
      #     ~100MB risks an OOM mid-execution, so we keep Code execution in the
      #     main process. Current pinned n8n logs a cosmetic deprecation notice;
      #     if you bump to a version that REQUIRES runners, flip this to true
      #     and raise n8n's mem_limit to ~640m. RAM safety wins here by default. ---
      - N8N_RUNNERS_ENABLED=false
      # --- Allow the Code node to read the vault with Node's fs/path ---
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
      # --- Keep large binaries off the V8 heap ---
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      # --- Memory hygiene: prune executions so SQLite never balloons ---
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168            # hours = 7 days
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      # --- Less outbound chatter / noise on a constrained box ---
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      # --- Cap the V8 heap below the container limit for clean GC, not OOM ---
      - NODE_OPTIONS=--max-old-space-size=320
      # --- Exposed to workflow expressions via $env (no manual credential step) ---
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-secondbrain}
      - WA_TARGET_NUMBER=${WA_TARGET_NUMBER}
      # --- Telegram delivery (reliable alternative to the WhatsApp gateway) ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - n8n_data:/home/node/.n8n
      # READ-ONLY bind mount of the Windows Obsidian/Logseq vault.
      # Set VAULT_PATH in .env (forward slashes), e.g. C:/Users/you/SecondBrain
      # Inside every container the vault is ALWAYS at /data/vault.
      - "${VAULT_PATH}:/data/vault:ro"
      # WRITABLE inbox for inbound WhatsApp captures + the action log
      # (/data/inbox/.actions.jsonl). Separate from the read-only vault so a
      # capture flow can never corrupt your notes. See docs/07.
      - "${INBOX_PATH}:/data/inbox"
    healthcheck:
      # `node` is always present in the n8n image; avoids depending on wget/curl.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 450m
    mem_reservation: 256m
    networks:
      - sbnet

  # ---------------------------------------------------------------------------
  # 2) Evolution API — open-source WhatsApp Web gateway (Baileys engine).
  #    Local HTTP <-> WhatsApp bridge. QR pairing, send/receive messages.
  # ---------------------------------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: sb-evolution
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - LANGUAGE=en
      # --- Persistence in Postgres (metadata only; message bodies disabled) ---
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_LABELS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      # --- Redis cache ---
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      # --- Inbound webhook to n8n is OFF by default (one-way nudge). Flip on
      #     and point at your n8n webhook URL to handle replies (see docs/03). ---
      - WEBHOOK_GLOBAL_ENABLED=false
      # --- Quieter logs = less I/O churn on a constrained host ---
      - LOG_LEVEL=ERROR
      - LOG_BAILEYS=error
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - NODE_OPTIONS=--max-old-space-size=280
    volumes:
      - evolution_instances:/evolution/instances
    mem_limit: 400m
    mem_reservation: 200m
    networks:
      - sbnet

  # ---------------------------------------------------------------------------
  # 3) Postgres — used ONLY by Evolution API. Tuned for a tiny footprint.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sb-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=evolution
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=32MB"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=16MB"
      - "-c"
      - "effective_cache_size=128MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    mem_limit: 256m
    mem_reservation: 96m
    networks:
      - sbnet

  # ---------------------------------------------------------------------------
  # 4) Redis — Evolution cache. Hard maxmemory cap, LRU eviction, no persistence.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sb-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--maxmemory"
      - "64mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
      - "--appendonly"
      - "no"
    volumes:
      - redis_data:/data
    mem_limit: 96m
    mem_reservation: 32m
    networks:
      - sbnet

networks:
  sbnet:
    driver: bridge

volumes:
  n8n_data:
  evolution_instances:
  postgres_data:
  redis_data:
